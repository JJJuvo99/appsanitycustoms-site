<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>App Privacy Policies – AppSanity Customs</title>
  <meta name="description" content="Privacy policy links for AppSanity Customs apps." />
  <style>
    :root { --fg:#0f172a; --muted:#475569; --bg1:#ffffff; --bg2:#f8fafc; --card:#ffffff; --link:#2563eb; }
    * { box-sizing: border-box; }
    body { margin:0; font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--fg);
      background: linear-gradient(180deg, var(--bg1), var(--bg2)); }
    .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 64px; }
    h1 { font-size: 28px; margin: 0 0 4px; }
    .muted { color: var(--muted); font-size: 14px; }
    ul { list-style: none; padding: 0; margin: 16px 0; }
    li { background: var(--card); border:1px solid #e2e8f0; border-radius:14px; padding:16px; margin:12px 0; }
    a { color: var(--link); text-decoration: none; font-weight: 600; } a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>App Privacy Policies</h1>
    <div class="muted">AppSanity Customs · Last updated: <time datetime="2025-10-10">10 Oct 2025</time></div>

    <ul>
      <li>
        <a href="/policies/<rork-transparent-task-list-app>/">Transparent Tasks – Privacy Policy</a>
        <div class="muted">Slug: <code>rork-transparent-task-list-app</code></div>
      </li>

      
      <li>

      </li>
    
    </ul>

    <p class="muted">Contact: <a href="mailto:support@appsanitycustoms.com">support@appsanitycustoms.com</a></p>
  </div>
</body>
</html>
